<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkHub</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #334155; background-color: #f8f9fa;">
        <h2 style="margin-bottom: 8px;">Loading LinkHub...</h2>
        <p style="color: #64748b; font-size: 14px;">If this takes more than a few seconds, press F12 to open Developer Tools and check the Console for errors.</p>
      </div>
     </div>
     <script>
      window.onerror = function(msg, url, line, col, error) {
        const pre = document.createElement('pre');
        pre.style.cssText = 'color:red;padding:20px;background:#fee;border:1px solid red;';
        pre.textContent = error ? (error.stack || error.toString()) : msg;
        document.body.appendChild(pre);
        console.error('Error:', error || msg);
      };
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled rejection:', e.reason);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
